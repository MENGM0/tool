<h2>界面布局方案</h2>
<p class="subtitle">选择您偏好的工具界面布局</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单页双区布局</h3>
      <p>左右分栏：左侧编码区（上传图片→Base64），右侧解码区（Base64→图片预览）</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>标签切换布局</h3>
      <p>顶部标签页切换：一个页面切换"编码"和"解码"两个功能区域</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单功能简化布局</h3>
      <p>紧凑单页面，上方编码区域，下方解码区域，简洁直观</p>
    </div>
  </div>
</div>

<p style="margin-top: 1rem; color: #666;">请在浏览器中点击选择，然后在终端告诉我您的决定。</p>
