<h2>UI设计预览</h2>
<p class="subtitle">左右双区布局的具体设计</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">左侧：编码区</div>
    <div class="mockup-body" style="padding: 1rem;">
      <div class="section">
        <div class="label">上传图片</div>
        <div style="border: 2px dashed #ccc; padding: 2rem; text-align: center; border-radius: 8px; margin-top: 0.5rem;">
          <p style="color: #666;">点击或拖拽图片到此处</p>
          <button class="mock-button" style="margin-top: 0.5rem;">选择文件</button>
        </div>
      </div>
      <div class="section">
        <div class="label">图片预览</div>
        <div class="placeholder" style="height: 100px; margin-top: 0.5rem;">缩略图显示区域</div>
      </div>
      <div class="section">
        <div class="label">Base64结果 (Data URI)</div>
        <textarea class="mock-input" style="width: 100%; height: 80px; resize: vertical;"></textarea>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
          <button class="mock-button">复制</button>
          <button class="mock-button">下载</button>
        </div>
      </div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">右侧：解码区</div>
    <div class="mockup-body" style="padding: 1rem;">
      <div class="section">
        <div class="label">输入Base64</div>
        <textarea class="mock-input" style="width: 100%; height: 100px; resize: vertical;" placeholder="粘贴Data URI或纯Base64..."></textarea>
      </div>
      <div class="section">
        <div class="label">解码结果</div>
        <div class="placeholder" style="height: 150px; margin-top: 0.5rem;">图片预览区域</div>
      </div>
      <div class="section">
        <div style="display: flex; gap: 0.5rem;">
          <button class="mock-button">下载图片</button>
          <button class="mock-button" style="opacity: 0.5;">清除</button>
        </div>
      </div>
    </div>
  </div>
</div>

<p style="margin-top: 1rem; color: #666;">这是预期的UI结构。请确认是否符合您的期望，或提出修改意见。</p>
